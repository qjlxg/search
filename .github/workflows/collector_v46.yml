name: GitHub Collector v46 Workflow

# 触发条件
on:
  push:
    paths:
      - 'collector_v46.py'           # 当脚本文件变动时触发
      - '.github/workflows/collector_v46.yml' # 当工作流文件自身变动时触发
  workflow_dispatch:                 # 支持手动运行
  schedule:
    - cron: '0 */6 * * *'            # 每6小时自动运行一次（可选，可删除）

# 环境变量设置
env:
  TZ: Asia/Shanghai                  # 设置上海时区

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    
    # 赋予推送权限
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython geoip2

      - name: Run Collector Script
        env:
          # 使用你在 Secrets 中设置的个人访问令牌
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
        run: python collector_v46.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加所有生成的文件目录
          git add splitted/ protocols/ networks/ countries/ security/ database/
          git add latest_configs.txt validated_subscriptions.json geoip.mmdb
          
          # 检查是否有文件变动，如果有则提交
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M:%S') (Shanghai Time)"
            git push
          fi
