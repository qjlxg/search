name: GitHub Collector v46 Workflow

on:
  push:
    paths:
      - 'collector_v46.py'
      - '.github/workflows/collector_v46.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython geoip2

      - name: Run Collector Script
        env:
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
        run: python collector_v46.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 尝试添加存在的文件夹 (如果文件夹不存在，也不会报错)
          git add splitted/ protocols/ networks/ countries/ security/ database/ 2>/dev/null || true
          
          # 2. 检查特定文件是否存在，存在才添加
          [ -f latest_configs.txt ] && git add latest_configs.txt
          [ -f validated_subscriptions.json ] && git add validated_subscriptions.json
          
          # 3. 提交并推送
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto Update Nodes: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
